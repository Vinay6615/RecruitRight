<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./signin.css">
</head>
<body>
    <h1>Login/Signin to your RecruitRight account:</h1>
        <div class = "grid-container"> 
            <div class = "card" "card1">
                <p class="a">Sign in/Login<br>
                    <form>
                    Username: <input type="text" name="username" id="username" placeholder="Enter your username"> <br>
                    Password: <input type="password" name="password" id="password" placeholder="Enter your password"> <br>
                    <input type="submit" id="button" value="Sign In">
                    </form>
                </p>
            </div>
            </div>
        </div> 
        <script>
document.querySelector("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const res = await fetch("http://127.0.0.1:5000/api/auth/signin", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  alert(data.message);
});
</script>

    
<script src="/static/js/auth.js"></script></body>
</html>
